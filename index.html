                                <span style={{ flexShrink: 0 }}>{expandedCats.includes(id) ? '▲' : '▼'}</span>
                                <div className="mh-cat-title">
                                    <span className="mh-cat-title-he">{cat.title}</span>
                                    <span className="mh-cat-meta">
                                        <i className={`fas ${CAT_ICONS[id] || 'fa-folder'}`} style={{ fontSize: '1.25rem' }}></i>
                                        <span style={{ background: 'rgba(255,255,255,0.3)', padding: '2px 8px', borderRadius: 'var(--radius-sm)', fontSize: 'var(--text-sm)' }}>{cat.services.length}</span>
                                    </span>
                                    <span className="mh-cat-title-en">{cat.titleEn}</span>
                                </div>
                            </div>
                            {expandedCats.includes(id) && (
                                <div>
                                    <p className="mh-cat-desc">{cat.desc}</p>
                                    <div className="mh-cat-grid">
                                        {cat.services.map((s, i) => <Card key={i} s={s} />)}
                                    </div>
                                </div>
                            )}
                        </div>
                    ))}

                    <div className="mh-footer">
                        <p style={{ margin: '0 0 var(--space-md)', fontWeight: 'bold' }}><i className="fas fa-info-circle"></i> הצהרת אחריות</p>
                        <p style={{ margin: '0 0 var(--space-xl)', opacity: 0.9 }}>
                            המידע לצורכי הכוונה בלבד ואינו מהווה ייעוץ רפואי או משפטי
                        </p>
                        <p style={{ margin: 0, fontSize: 'var(--text-sm)', opacity: 0.7 }}>
                            {`עודכן: ${LAST_UPDATED}`}
                        </p>
                    </div>
                </div>
            );
        };
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MentalHealthIsrael />);
    </script>

<!-- Improved Button Click Tracking for Google Analytics -->
<script>
  window.addEventListener('load', function() {
    console.log('✅ Click tracking initialized');
    
    document.addEventListener('click', function(e) {
      const element = e.target.closest('button, a, [role="button"]');
      
      if (element && typeof gtag !== 'undefined') {
        let buttonName = 'unknown';
        let buttonType = element.tagName.toLowerCase();
        let destination = '';
        
        // Priority order for getting button name:
        // 1. data-tracking-name (custom attribute you can add)
        // 2. aria-label (accessibility label)
        // 3. title attribute
        // 4. Button text (cleaned up)
        // 5. href for links
        
        if (element.hasAttribute('data-tracking-name')) {
          buttonName = element.getAttribute('data-tracking-name');
        } else if (element.hasAttribute('aria-label')) {
          buttonName = element.getAttribute('aria-label');
        } else if (element.hasAttribute('title')) {
          buttonName = element.getAttribute('title');
        } else if (element.textContent.trim()) {
          buttonName = element.textContent.trim().substring(0, 100); // Limit to 100 chars
        }
        
        // For links, capture the destination
        if (element.tagName === 'A' && element.href) {
          destination = element.href;
          // If button name is just the emoji, use a cleaned URL instead
          if (buttonName === 'לאתר 🔗' || buttonName.length < 3) {
            try {
              const url = new URL(element.href);
              buttonName = url.hostname.replace('www.', '');
            } catch (e) {
              buttonName = element.href;
            }
          }
        }
        
        console.log('📊 Tracking click:', {
          name: buttonName,
          type: buttonType,
          destination: destination
        });
        
        // Send to Google Analytics
        gtag('event', 'button_click', {
          'button_name': buttonName,
          'button_type': buttonType,
          'link_url': destination,
          'page_location': window.location.href
        });
        
        console.log('✅ Event sent to Google Analytics');
      }
    });
  });
</script>
